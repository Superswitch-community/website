<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Long Press Emoji Reaction</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 flex justify-center mt-20">

  <div class="w-80">
    
    <!-- Message -->
    <div id="messageBox" 
      class="bg-white p-4 rounded-2xl shadow select-none">
      
      <p class="text-gray-800">
        <span class="font-semibold">John:</span> Hey! How are you doing today?
      </p>

      <!-- Hidden Input (for emoji keyboard) -->
      <input 
        type="text" 
        id="emojiInput"
        class="opacity-0 absolute pointer-events-none"
      />

      <!-- Reaction Display -->
      <div id="reactionDisplay" class="mt-2 text-lg"></div>
    </div>

  </div>

<script>
  const message = document.getElementById("messageBox");
  const input = document.getElementById("emojiInput");
  const display = document.getElementById("reactionDisplay");

  let pressTimer;

  // LONG PRESS
  message.addEventListener("touchstart", () => {
    pressTimer = setTimeout(() => {
      input.focus(); // opens phone keyboard
    }, 500);
  });

  message.addEventListener("touchend", () => {
    clearTimeout(pressTimer);
  });

  // DESKTOP SUPPORT
  message.addEventListener("mousedown", () => {
    pressTimer = setTimeout(() => {
      input.focus();
    }, 500);
  });

  message.addEventListener("mouseup", () => {
    clearTimeout(pressTimer);
  });

  // HANDLE EMOJI INPUT
  input.addEventListener("input", (e) => {
    const value = e.target.value;

    // get last emoji typed
    const emoji = value.slice(-2);

    display.textContent = emoji;

    // clear input
    input.value = "";
  });
</script>

</body>
</html>
