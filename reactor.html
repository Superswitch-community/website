<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat Reaction Box</title>

  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 flex justify-center mt-20">

  <div class="w-80">
    
    <!-- Message -->
    <div class="bg-white p-4 rounded-2xl shadow">
      <p class="text-gray-800">
        <span class="font-semibold">John:</span> Hey! How are you doing today?
      </p>

      <!-- Reaction Bar -->
      <div class="flex gap-2 mt-3">
        <button class="reaction text-xl hover:scale-125 transition">👍</button>
        <button class="reaction text-xl hover:scale-125 transition">❤️</button>
        <button class="reaction text-xl hover:scale-125 transition">😂</button>
        <button class="reaction text-xl hover:scale-125 transition">😮</button>
        <button class="reaction text-xl hover:scale-125 transition">😢</button>
      </div>

      <!-- User Reaction -->
      <div id="userReaction" class="mt-2 text-sm text-gray-600"></div>
    </div>

  </div>

<script>
  const reactions = document.querySelectorAll(".reaction");
  const display = document.getElementById("userReaction");

  reactions.forEach(btn => {
    btn.addEventListener("click", () => {

      // remove previous highlight
      reactions.forEach(r => r.classList.remove("bg-gray-200", "rounded"));

      // add highlight
      btn.classList.add("bg-gray-200", "rounded");

      // show reaction
      display.textContent = "You reacted: " + btn.textContent;
    });
  });
</script>

</body>
</html>
