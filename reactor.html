<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pro Chat Reaction</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 flex justify-center mt-20">

  <div class="w-80">
    
    <!-- Message -->
    <div id="messageBox" 
      class="bg-white p-4 rounded-2xl shadow select-none relative">
      
      <p class="text-gray-800">
        <span class="font-semibold">John:</span> Hey! How are you doing today?
      </p>

      <!-- Hidden Input -->
      <input 
        type="text" 
        id="emojiInput"
        class="opacity-0 absolute pointer-events-none"
      />

      <!-- Reactions Container -->
      <div id="reactions" class="flex gap-1 mt-2"></div>
    </div>

  </div>

<script>
  const message = document.getElementById("messageBox");
  const input = document.getElementById("emojiInput");
  const reactionsBox = document.getElementById("reactions");

  let pressTimer;
  let userReaction = null;

  // LONG PRESS
  message.addEventListener("touchstart", () => {
    pressTimer = setTimeout(() => input.focus(), 500);
  });

  message.addEventListener("touchend", () => {
    clearTimeout(pressTimer);
  });

  message.addEventListener("mousedown", () => {
    pressTimer = setTimeout(() => input.focus(), 500);
  });

  message.addEventListener("mouseup", () => {
    clearTimeout(pressTimer);
  });

  // HANDLE INPUT
  input.addEventListener("input", (e) => {
    const emoji = e.target.value.slice(-2);

    if (!emoji) return;

    // Remove old reaction if exists
    if (userReaction) {
      userReaction.remove();
    }

    // Create new reaction
    const span = document.createElement("span");
    span.textContent = emoji;
    span.className = "text-lg bg-gray-200 px-2 rounded-full cursor-pointer";

    // Allow change on click
    span.addEventListener("click", () => {
      input.focus();
    });

    reactionsBox.appendChild(span);
    userReaction = span;

    input.value = "";
  });
</script>

</body>
</html>
