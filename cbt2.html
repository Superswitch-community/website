<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nigerian Education Portal - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Background image using a high-quality Nigerian student photo from Pexels */
        .bg-nigerian-edu {
            background-image: linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.5)), 
                              url('https://images.pexels.com');
            background-size: cover;
            background-position: center;
        }
    </style>
</head>
<body class="bg-nigerian-edu h-screen flex items-center justify-center font-sans">

    <!-- Login Container -->
    <div class="bg-white/10 backdrop-blur-md p-8 rounded-2xl shadow-2xl w-full max-w-md border border-white/20 mx-4">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-white mb-2">Welcome Back</h1>
            <p class="text-gray-200">Log in to your Nigerian student portal</p>
        </div>

        <form id="loginForm" class="space-y-6">
            <!-- Email Field -->
            <div>
                <label class="block text-sm font-medium text-white mb-1">Email Address</label>
                <input type="email" id="email" required
                    class="w-full px-4 py-3 rounded-lg bg-white/20 border border-white/30 text-white placeholder-gray-300 focus:outline-none focus:ring-2 focus:ring-green-400 transition"
                    placeholder="e.g. name@university.edu.ng">
            </div>

            <!-- Password Field -->
            <div>
                <label class="block text-sm font-medium text-white mb-1">Password</label>
                <input type="password" id="password" required
                    class="w-full px-4 py-3 rounded-lg bg-white/20 border border-white/30 text-white placeholder-gray-300 focus:outline-none focus:ring-2 focus:ring-green-400 transition"
                    placeholder="••••••••">
            </div>

            <!-- Action Buttons -->
            <button type="submit" 
                class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-3 rounded-lg shadow-lg transform active:scale-95 transition duration-200">
                Sign In
            </button>
        </form>

        <!-- Links -->
        <div class="mt-6 text-center text-sm text-gray-200">
            <a href="#" class="hover:text-green-400 underline">Forgot Password?</a>
            <p class="mt-2">Don't have an account? <a href="#" class="font-bold text-white hover:text-green-400">Register</a></p>
        </div>
    </div>

    <script>
        // Simple JavaScript to handle form submission
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            
            // Just a demo action
            alert(`Welcome, ${email.split('@')[0]}! Logging you into the portal...`);
        });
    </script>
</body>
</html>
