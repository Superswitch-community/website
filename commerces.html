<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Commerce Landing Page</title>
    <!-- Include Tailwind CSS from CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Include Heroicons for the star icon -->
    <link href="https://cdn.jsdelivr.net" rel="stylesheet">
</head>

<body class="bg-gray-100">

    <!-- Header & Search -->
    <header class="bg-white shadow-md sticky top-0 z-50">
        <div class="container mx-auto px-4 py-4 flex justify-between items-center">
            <h1 class="text-2xl font-bold text-gray-800">My Shop</h1>
            <div class="relative">
                <input type="text" id="searchInput" placeholder="Search products..."
                    class="px-4 py-2 border border-gray-300 rounded-lg w-64 focus:outline-none focus:ring-2 focus:ring-blue-500"
                    oninput="filterProducts()">
                <svg xmlns="http://www.w3.org"
                    class="h-5 w-5 absolute right-3 top-1/2 transform -translate-y-1/2 text-gray-400" fill="none"
                    viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                </svg>
            </div>
        </div>
    </header>

    <!-- Product Grid -->
    <main class="container mx-auto px-4 py-8">
        <div id="productList" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-8">
            <!-- Products will be dynamically inserted here by JavaScript -->
        </div>
    </main>

    <!-- Loading Spinner (optional) -->
    <div id="loadingSpinner" class="flex justify-center items-center h-64">
        <div class="loader ease-linear rounded-full border-8 border-t-8 border-gray-200 h-16 w-16"></div>
    </div>
    <style>
        .loader {
            border-top-color: #3b82f6;
            /* Blue 500 */
            animation: spinner 1.5s linear infinite;
        }

        @keyframes spinner {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }
    </style>

    <!-- JavaScript -->
    <script>
        const productListEl = document.getElementById('productList');
        const loadingSpinnerEl = document.getElementById('loadingSpinner');
        let allProducts = [];

        //Initial Fetch

        async function fetchOnMount() {

            try {
                const response = await fetch("https://dummyjson.com/products"); // Fetch up to 100 products
                const data = await response.json();
                allProducts = data.products;
                console.log(allProducts)
                displayProducts(allProducts);
                loadingSpinnerEl.style.display = 'none';
            } catch (error) {
                console.error('Error fetching products:', error);
                productListEl.innerHTML = '<p class="text-red-500">Failed to load products. Please try again later.</p>';
                loadingSpinnerEl.style.display = 'none';
            }
        }

        // Function to fetch products from DummyJSON API
        async function fetchProducts(products) {
            /*  https://dummyjson.com/products/category/smartphones */

            /*https://dummyjson.com/products/category/${products} */
            try {
                const response = await fetch(`https://dummyjson.com/products/search?q=${products}`); // Fetch up to 100 products
                const data = await response.json();
                allProducts = data.products;
                console.log(allProducts)
                displayProducts(allProducts);
                loadingSpinnerEl.style.display = 'none';
            } catch (error) {
                console.error('Error fetching products:', error);
                productListEl.innerHTML = '<p class="text-red-500">Failed to load products. Please try again later.</p>';
                loadingSpinnerEl.style.display = 'none';
            }
        }

        // Function to display products in the UI
        function displayProducts(products) {
            productListEl.innerHTML = ''; // Clear previous products
            products.forEach(product => {
                const productCard = document.createElement('div');
                productCard.className = 'bg-white rounded-lg shadow-lg overflow-hidden transform transition duration-300 hover:scale-105';
                productCard.innerHTML = `
                    <img src="${product.thumbnail}" alt="${product.title}" class="w-full h-48 object-cover">
                    <div class="p-5">
                        <h2 class="text-xl font-semibold mb-2 truncate">${product.title}</h2>
                        <p class="text-gray-600 mb-3 truncate">${product.description}</p>
                        <div class="flex items-center justify-between">
                            <span class="text-2xl font-bold text-gray-800">$${product.price.toFixed(2)}</span>
                            <div class="flex items-center">
                                <!-- Star icon (using inline SVG for simplicity in single file) -->
                                <svg xmlns="http://www.w3.org" class="h-5 w-5 text-yellow-400 fill-current" viewBox="0 0 20 20">
                                    <path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.286 3.967a1 1 0 00.95.69h4.175c.969 0 1.371 1.24.588 1.81l-3.374 2.454a1 1 0 00-.364 1.118l1.287 3.967c.3.921-.755 1.688-1.54 1.118l-3.374-2.454a1 1 0 00-1.176 0l-3.374 2.454c-.785.57-1.84-.197-1.54-1.118l1.287-3.967a1 1 0 00-.364-1.118L2.083 9.394c-.783-.57-.38-1.81.588-1.81h4.175a1 1 0 00.95-.69L9.049 2.927z" />
                                </svg>
                                <span class="text-gray-600 ml-1">${product.rating.toFixed(1)}</span>
                            </div>
                        </div>
                        <button class="mt-4 w-full bg-blue-500 hover:bg-blue-600 text-white font-bold py-2 px-4 rounded-lg transition duration-300">Add to Cart</button>
                    </div>
                `;
                productListEl.appendChild(productCard);
            });
        }

        // Function to filter products based on search input
        function filterProducts() {
            let allProducts = [];
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            /* const filteredProducts = allProducts.filter(product => {
                // Filter by title or description
                return product.title.toLowerCase().includes(searchTerm) || 
                       product.description.toLowerCase().includes(searchTerm);
            }); */
            console.log(searchTerm)
            fetchProducts(searchTerm);

        }



        // Initial fetch
        fetchOnMount();
    </script>

</body>

</html>
