<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JAMB CBT Portal | Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        
        /* NIGERIAN CBT BACKGROUND WITH LOW OPACITY */
        .cbt-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://myschool.ng');
            background-size: cover; background-position: center;
            opacity: 0.15; z-index: -1;
        }

        .glass-dark { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(8px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .hidden-page { display: none !important; }
        
        /* CUSTOM ALERT ANIMATION */
        @keyframes slideIn { from { transform: translateY(-100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .alert-animate { animation: slideIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
    </style>
</head>
<body class="bg-slate-950 text-slate-200 min-h-screen flex items-center justify-center p-4">

    <div class="cbt-bg"></div>

    <!-- CUSTOM ALERT MODAL -->
    <div id="custom-alert" class="fixed top-10 z-50 hidden-page flex justify-center w-full px-4">
        <div class="glass-dark alert-animate border-l-4 border-emerald-500 p-5 rounded-2xl flex items-center gap-4 shadow-2xl max-w-sm w-full">
            <div class="h-10 w-10 bg-emerald-500/20 rounded-full flex items-center justify-center text-emerald-400">
                <i class="fa-solid fa-circle-check"></i>
            </div>
            <div>
                <p class="font-bold text-white">Access Granted</p>
                <p class="text-xs text-slate-400">Redirecting to exam portal...</p>
            </div>
        </div>
    </div>

    <!-- LOGIN PAGE -->
    <div id="page-login" class="max-w-md w-full glass-dark rounded-[2.5rem] p-10 shadow-2xl text-center">
        <div class="w-20 h-20 bg-green-600/20 rounded-3xl flex items-center justify-center mx-auto mb-6 border border-green-500/30">
            <i class="fa-solid fa-fingerprint text-3xl text-green-500"></i>
        </div>
        
        <h1 class="text-3xl font-black text-white mb-2">CBT Login</h1>
        <p class="text-slate-400 text-xs uppercase tracking-widest font-bold mb-8">Enter Examination PIN</p>
        
        <div class="space-y-4">
            <input type="text" id="username" placeholder="Candidate Name" class="w-full bg-slate-900/50 border border-slate-700 rounded-2xl p-5 outline-none focus:border-green-500 text-white font-bold transition-all">
            
            <input type="password" id="pin" maxlength="4" placeholder="Enter 4-Digit PIN" class="w-full bg-slate-900/50 border border-slate-700 rounded-2xl p-5 outline-none focus:border-green-500 text-white text-center text-2xl tracking-[1em] font-black transition-all">
            
            <button onclick="validateLogin()" class="w-full py-5 bg-green-600 hover:bg-green-500 text-white rounded-2xl font-bold shadow-lg shadow-green-600/20 transition-all active:scale-95 mt-4">
                Verify Credentials
            </button>
        </div>
    </div>

    <!-- INSTRUCTIONS PAGE -->
    <div id="page-instructions" class="max-w-2xl w-full glass-dark rounded-[2.5rem] p-10 hidden-page shadow-2xl border-t-4 border-green-500">
        <h2 class="text-2xl font-black text-white mb-6">Read Carefully</h2>
        <div class="space-y-4 text-slate-300 text-sm mb-10">
            <p>1. Ensure your system number matches your seat.</p>
            <p>2. Do not use external calculators.</p>
            <p>3. Submit only when you have completed all 10 questions.</p>
        </div>
        <button onclick="alert('Starting Quiz Engine...')" class="w-full py-4 bg-green-600 text-white rounded-2xl font-bold">Start Quiz</button>
    </div>

    <script>
        function validateLogin() {
            const name = document.getElementById('username').value;
            const pin = document.getElementById('pin').value;
            const alertBox = document.getElementById('custom-alert');

            // Virtual PIN is 1234
            if (name && pin === "1234") {
                // Show Beautiful Alert
                alertBox.classList.remove('hidden-page');
                
                setTimeout(() => {
                    alertBox.classList.add('hidden-page');
                    document.getElementById('page-login').classList.add('hidden-page');
                    document.getElementById('page-instructions').classList.remove('hidden-page');
                }, 2000);
            } else {
                alert("Invalid PIN. Please try again.");
            }
        }
    </script>

</body>
</html>
