<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Quiz App</title>
    <!-- Include Tailwind CSS from CDN -->
    <link href="https://cdn.jsdelivr.net" rel="stylesheet">
</head>

<body class="bg-gray-100 flex items-center justify-center h-screen">
    <div class="bg-white p-8 rounded-lg shadow-lg w-full max-w-lg">
        <h1 class="text-2xl font-bold mb-6 text-gray-800">API Quiz</h1>
        <div id="quiz-container">
            <!-- Questions and answers will be dynamically inserted here by JavaScript -->
            <p class="text-gray-600">Loading questions...</p>
        </div>
        <button id="next-button"
            class="mt-6 w-full bg-blue-500 hover:bg-blue-600 text-white font-bold py-2 px-4 rounded focus:outline-none focus:shadow-outline"
            style="display:none;">
            Next Question
        </button>
        <div id="result" class="mt-4 p-4 rounded-lg text-center" style="display:none;"></div>
    </div>

    <!-- Link your JavaScript file -->
    <script src="script.js"></script>
</body>
<script>

    const quizContainer = document.getElementById('quiz-container');
    const nextButton = document.getElementById('next-button');
    const resultDiv = document.getElementById('result');

    let questions = [];
    let currentQuestionIndex = 0;
    let score = 0;

    // Function to fetch questions from the Open Trivia Database API
    async function fetchQuestions() {
        try {
            const response = await fetch('https://opentdb.com');
            const data = await response.json();
            questions = data.results;
            displayQuestion();
            nextButton.style.display = 'block';
        } catch (error) {
            console.error('Error fetching questions:', error);
            quizContainer.innerHTML = '<p class="text-red-500">Failed to load questions. Please try again later.</p>';
        }
    }

    // Function to display a question and its options
    function displayQuestion() {
        if (currentQuestionIndex < questions.length) {
            const currentQuestion = questions[currentQuestionIndex];
            const answers = [...currentQuestion.incorrect_answers, currentQuestion.correct_answer];
            // Shuffle answers to ensure correct answer isn't always in the same position
            answers.sort(() => Math.random() - 0.5);

            let htmlOutput = `<div class="mb-4">
            <p class="font-semibold mb-4">${currentQuestion.question}</p>
            <div class="space-y-2">`;

            answers.forEach(answer => {
                htmlOutput += `<label class="block bg-gray-100 p-3 rounded-md cursor-pointer hover:bg-gray-200">
                <input type="radio" name="answer" value="${answer}" class="mr-3">
                ${answer}
            </label>`;
            });

            htmlOutput += `</div></div>`;
            quizContainer.innerHTML = htmlOutput;
        } else {
            showResult();
        }
    }

    // Function to handle the "Next Question" button click
    nextButton.addEventListener('click', () => {
        const selectedAnswer = document.querySelector('input[name="answer"]:checked');
        if (selectedAnswer) {
            checkAnswer(selectedAnswer.value);
            currentQuestionIndex++;
            displayQuestion();
        } else {
            alert('Please select an answer.');
        }
    });

    // Function to check the selected answer
    function checkAnswer(answer) {
        if (answer === questions[currentQuestionIndex].correct_answer) {
            score++;
        }
    }

    // Function to display the final result
    function showResult() {
        quizContainer.style.display = 'none';
        nextButton.style.display = 'none';
        resultDiv.style.display = 'block';
        resultDiv.innerHTML = `<p class="text-xl font-bold">Quiz Finished!</p>
                           <p>Your final score is ${score} out of ${questions.length}.</p>`;
        if (score === questions.length) {
            resultDiv.classList.add('bg-green-200', 'text-green-800');
        } else {
            resultDiv.classList.add('bg-blue-200', 'text-blue-800');
        }
    }

    // Initialize the quiz by fetching questions
    fetchQuestions();

</script>
</html>
