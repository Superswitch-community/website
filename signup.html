<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Student...</title>
    <script src="./static/index.js"></script>
</head>

<body>
    <div class="min-h-screen bg-gray-100 flex items-center justify-center p-6">
        <form class="bg-white p-8 rounded-xl shadow-lg max-w-8xl w-full space-y-6">

            <h2 class="text-2xl font-bold text-gray-800">Create Account</h2>


            <!-- EMAIL -->
            <div>
                <label class="block text-gray-700 mb-1 font-medium">Email</label>
                <input id="email" name="email" type="email"
                    class="w-full border rounded-lg p-3 focus:outline-none focus:ring-green-500" required />

            </div>

            <!-- PASSWORD -->
            <div>
                <label class="block text-gray-700 mb-1 font-medium">Password</label>
                <input id="password" name="password" type="password"
                    class="w-full border rounded-lg p-3 focus:outline-none focus:ring-green-500" required />

            </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">


                <!-- SUBMIT -->
                <button id="submit-btn"
                    class="w-full bg-green-600 text-white py-3 rounded-lg text-lg font-semibold transition">
                    Create Account
                </button>


        </form>
    </div>


</body>
<script>

    document.getElementById('submit-btn').addEventListener('click', async (e) => {
        e.preventDefault();

        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;

            try {
                const response = await fetch('http://localhost:5000/api/students', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                })
                const data = await response.json()

                console.log(data);
            } catch (error) {
                console.log(error)
            }

    })
</script>

</html>
